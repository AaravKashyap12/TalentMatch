name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: talentmatch
          POSTGRES_PASSWORD: talentmatch
          POSTGRES_DB: talentmatch_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://talentmatch:talentmatch@localhost:5432/talentmatch_test
        run: |
          python -m alembic upgrade head

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://talentmatch:talentmatch@localhost:5432/talentmatch_test
        run: |
          pytest tests/ -v --tb=short -x

  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install dependencies
        working-directory: ./web
        run: npm install

      - name: Run ESLint
        working-directory: ./web
        run: npm run lint

      - name: Build frontend
        working-directory: ./web
        run: npm run build
