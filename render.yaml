services:
  - type: web
    name: talentmatch-api
    runtime: python
    region: oregon
    plan: starter
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: talentmatch-db
          property: connectionString
      - key: ADMIN_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_HOURS
        value: "24"
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ENABLE_GROQ_JD_PARSING
        value: "true"
      - key: ENABLE_GROQ_OVERVIEWS
        value: "true"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.1-8b-instant"
      - key: GROQ_BASE_URL
        value: "https://api.groq.com/openai/v1"
      - key: GROQ_TIMEOUT_SECONDS
        value: "8"
      - key: GROQ_MAX_JD_CHARS
        value: "6000"
      - key: FREE_SCAN_LIMIT
        value: "5"
      - key: MAX_UPLOAD_SIZE_MB
        value: "20"
      - key: MAX_FILES_PER_SCAN
        value: "15"
      - key: DEV_MODE
        value: "false"

databases:
  - name: talentmatch-db
    plan: basic-256mb
    databaseName: talentmatch
    user: talentmatch
    postgresMajorVersion: "17"
