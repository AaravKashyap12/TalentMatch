services:
  - type: web
    name: talentmatch-api
    env: docker                         # use Dockerfile
    dockerfilePath: ./Dockerfile
    # Single worker — multiple workers each load spaCy separately and exhaust
    # the 512 MB Render free-tier RAM budget.
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: talentmatch-db
          property: connectionString
      - key: ADMIN_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://your-frontend.vercel.app"
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"

databases:
  - name: talentmatch-db
    plan: free
    databaseName: talentmatch
    user: talentmatch
