services:
  - type: web
    name: talentmatch-api
    env: docker                         # use Dockerfile instead of raw Python env
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health     # Render polls this — 200 = ready
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: talentmatch-db
          property: connectionString
      - key: ADMIN_SECRET
        generateValue: true             # Render generates a random value on first deploy
      - key: CORS_ORIGINS
        value: "https://your-frontend.vercel.app"
      - key: MAX_UPLOAD_SIZE_MB
        value: "20"

databases:
  - name: talentmatch-db
    plan: free
    databaseName: talentmatch
    user: talentmatch
